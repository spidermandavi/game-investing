<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invest Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Investment Game</h1>

  <!-- Setup -->
  <div id="setup">
    <label>Players:
      <select id="playerCount">
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </label>

    <label>Game Mode:
      <select id="gameMode">
        <option value="turns">Turns</option>
        <option value="money">Target Money</option>
      </select>
    </label>

    <input id="modeValue" placeholder="Enter value (e.g. 20 turns or 5000)" />
    <button onclick="startGame()">Start Game</button>
  </div>

  <!-- Game -->
  <div id="game" class="hidden">

    <div id="infoBar"></div>

    <table id="stockTable">
      <thead>
        <tr>
          <th>Company</th>
          <th>Price</th>
          <th>Change</th>
          <th>Owned</th>
          <th>Buy</th>
          <th>Sell</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button onclick="endTurn()">End Turn</button>
  </div>

</div>

<!-- Popup -->
<div id="popup" class="hidden">
  <div id="popupContent"></div>
  <button onclick="closePopup()">OK</button>
</div>

<script src="script.js"></script>
</body>
</html>
